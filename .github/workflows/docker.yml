name: Build and Push

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-knob-reader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build knob_reader (ARM static)
        run: arm-linux-gnueabihf-gcc -static -o knob_reader knob_reader.c

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: knob_reader-arm
          path: knob_reader

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: knob_reader

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            rsmcx1/porto-watchdog:latest
            rsmcx1/porto-watchdog:${{ github.sha }}
