# Mumla Channel Bot - Configuration
# ====================================

[mumble]
# Mumble server (as seen from the bot container/host)
# If running in Docker alongside murmurd, use the Docker service name
host = murmur
port = 64738

# Bot credentials
bot_username = ChannelBot
bot_password =

[security]
# Shared secret - MUST match the secret on each knob_reader
# Generate one with: python3 channel_bot.py --gen-secret
secret = CHANGE_ME_GENERATE_A_REAL_SECRET

# Optional: restrict to specific source IPs (comma-separated, empty = any)
# Example: 192.168.1.50,192.168.1.51
allowed_ips =

[udp]
# Port for knob_reader UDP packets
listen_port = 4378
listen_addr = 0.0.0.0

[radios]
# Map each radio_id to a Mumla username
# Format: radio_id = mumla_username
# The radio_id must match what the knob_reader sends (max 8 chars)
radio01 = TE300K
# radio02 = TE300K-2
# radio03 = TE300K-3

[channels]
sort_by = id
skip_root = true
wrap_around = true

[announce]
# Send channel name as Mumble text message (triggers Mumla TTS)
mumble_message = true
format = {channel}

[logging]
level = INFO
