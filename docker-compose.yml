services:
  # -------------------------------------------------------------------------
  # Porto Watchdog - remote watchdog for channel switching & alerts
  # All config via environment variables - no config files needed
  # -------------------------------------------------------------------------
  porto-watchdog:
    image: rsmcx1/porto-watchdog:latest
    container_name: porto-watchdog
    ports:
      - "4378:4378/udp"
    environment:
      # -- Mumble server --
      MUMBLE_HOST: zip-mumble-server
      MUMBLE_PORT: "64738"
      BOT_USERNAME: ChannelBot
      MUMBLE_SERVER_PASSWORD: ""

      # -- Security --
      # Generate with: docker run --rm rsmcx1/porto-watchdog --gen-secret
      # Option A: shared secret (all radios use this key)
      SECRET: "CHANGE_ME_GENERATE_A_REAL_SECRET"
      # Option B: per-radio secrets (overrides SECRET for listed radios)
      # Allows revoking a compromised radio without re-keying others
      # SECRETS: "radio01=secretA,radio02=secretB"
      # Optional: restrict source IPs (comma-separated, empty = any)
      ALLOWED_IPS: ""

      # -- UDP listener --
      UDP_PORT: "4378"
      UDP_ADDR: "0.0.0.0"

      # -- Channel navigation --
      CHANNELS_SORT_BY: id
      CHANNELS_SKIP_ROOT: "true"
      CHANNELS_WRAP_AROUND: "true"
      # Skip specific channels (comma-separated names, case-sensitive)
      # CHANNELS_SKIP: "Lobby,AFK,Admin"

      # -- TTS announcements --
      ANNOUNCE_ENABLED: "true"
      ANNOUNCE_FORMAT: "{channel}"

      # -- Emergency & Ident --
      EMERGENCY_FORMAT: "alert alert"
      IDENT_FORMAT: "{username}"

      # -- Logging --
      LOG_LEVEL: INFO

      # -- Radio mapping --
      # Format: radio_id=mumla_username (comma-separated, wildcards supported)
      # Examples: "radio01=TE300K" or "radio01=P*" (matches any user starting with P)
      RADIOS: "radio01=TE300K"
    volumes:
      # Persist bot certificate so it keeps the same identity across restarts
      # (required for Mumble ACL/registration)
      - porto-certs:/app/certs
    restart: unless-stopped

volumes:
  porto-certs:
